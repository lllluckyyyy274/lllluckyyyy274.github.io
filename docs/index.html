    <script>
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = window.localStorage.getItem('theme');
        const isDarkMode = savedTheme === 'dark';
        const updateTheme = (dark) => {
            document.body.classList.toggle('dark-theme', dark);
            if (themeToggle) {
                themeToggle.textContent = dark ? '白天' : '夜间';
                themeToggle.setAttribute('aria-label', dark ? '切换至白天模式' : '切换至夜间模式');
            }
            if (window.reloadLogoLoop) {
                window.reloadLogoLoop();
            }
        };
        if (savedTheme) {
            updateTheme(isDarkMode);
        }
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const nextDark = !document.body.classList.contains('dark-theme');
                window.localStorage.setItem('theme', nextDark ? 'dark' : 'light');
                updateTheme(nextDark);
            });
        }

        const visualFrame = document.querySelector('.visual-frame');
        const visualImg = visualFrame?.querySelector('img');
        if (visualFrame && visualImg) {
            const maxRotate = 12;
            visualFrame.addEventListener('pointermove', (event) => {
                const rect = visualFrame.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                const px = (x / rect.width - 0.5) * 2;
                const py = (y / rect.height - 0.5) * 2;
                const rotateY = px * maxRotate;
                const rotateX = -py * maxRotate;
                visualImg.style.transform = `perspective(1200px) scale(1.01) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            visualFrame.addEventListener('pointerleave', () => {
                visualImg.style.transform = 'perspective(1200px) scale(1) rotateX(0deg) rotateY(0deg)';
            });
        }
    </script>
        <script src="./assets/js/logoloop.js"></script>
        <script>
            const root = document.getElementById('logo-loop-root');
            let logoLoopDestroy = null;
            const MANIFEST = ["XPPen1.png","XPPen2.png","YGC1.png","YGC2.png","idrive1.png","idrive2.png","loreal1.png","loreal2.png","mojiang1.png","mojiang2.png","tomatoo1.png","tomatoo2.png","XUNG1.png","XUNG2.png","zao1.png","zao2.png"];

            const getTheme = () => (document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            const normalizeLogoName = name => name.replace(/\.[^.]+$/, '');

            const buildLogoList = manifest => {
                const theme = getTheme();
                const variant = theme === 'dark' ? '1' : '2';
                const groups = {};

                manifest.forEach(name => {
                    const match = name.match(/^(.+?)([12])(\.[^.]+)$/);
                    if (match) {
                        const base = normalizeLogoName(match[1]);
                        groups[base] = groups[base] || {};
                        groups[base][match[2]] = name;
                    } else {
                        const base = normalizeLogoName(name);
                        groups[base] = groups[base] || {};
                        groups[base].default = name;
                    }
                });

                return Object.values(groups).map(group => {
                    const chosen = group[variant] || group.default || group['2'] || group['1'] || Object.values(group)[0];
                    return { src: `assets/images/logo/${chosen}`, alt: normalizeLogoName(chosen) };
                });
            };

            const loadLogoLoop = () => {
                const logos = buildLogoList(MANIFEST);
                if (logoLoopDestroy) {
                    logoLoopDestroy();
                }
                logoLoopDestroy = createLogoLoop(root, {
                    logos,
                    speed: 40,
                    direction: 'left',
                    logoHeight: 40,
                    gap: 72,
                    hoverSpeed: 0,
                    pauseOnHover: false,
                    fadeOut: true,
                    scaleOnHover: true,
                    ariaLabel: '合作项目与案例'
                });
            };

            window.reloadLogoLoop = loadLogoLoop;
            loadLogoLoop();
        </script>
